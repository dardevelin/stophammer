name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-x86_64:
    name: Build x86_64 musl binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stophammer-x86_64
          path: target/x86_64-unknown-linux-musl/release/stophammer

  build-aarch64:
    name: Build aarch64 musl binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stophammer-aarch64
          path: target/aarch64-unknown-linux-musl/release/stophammer

  release:
    name: Create GitHub release
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: stophammer-x86_64
          path: dist/x86_64

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: stophammer-aarch64
          path: dist/aarch64

      - name: Rename binaries
        run: |
          mv dist/x86_64/stophammer dist/stophammer-linux-x86_64
          mv dist/aarch64/stophammer dist/stophammer-linux-aarch64
          chmod +x dist/stophammer-linux-x86_64 dist/stophammer-linux-aarch64

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/stophammer-linux-x86_64
            dist/stophammer-linux-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
